name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Build TypeScript
      run: |
        npm run build:app
        npm run build:electron

    - name: Run Tests
      run: npm test

    # - name: Build Electron App (Uncomment to build installer)
    #   run: npm run build
    #   env:
    #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
